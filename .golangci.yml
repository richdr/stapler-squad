version: "2"

linters:
  enable:
    - forbidigo
    - ineffassign
    - nilnil
    - staticcheck
    - govet
    - unused
  disable:
    - errcheck
  settings:
    forbidigo:
      forbid:
        - pattern: ^fmt\.Print(f|ln)?$
          msg: "use the log package instead of fmt.Print* in production code"
      exclude-godoc-examples: true
  exclusions:
    paths:
      - session/tmux/tmux_windows
      - web-app
    rules:
      # Allow fmt.Print* in main.go (CLI output) and test files
      - path: "main\\.go"
        linters: [forbidigo]
      - path: "_test\\.go"
        linters: [forbidigo]
      # Allow fmt.Print* in cmd/ subdirectories (CLI output)
      - path: "^cmd/"
        linters: [forbidigo]
      # Allow fmt.Print* in tests/demo/ directory (demo helpers)
      - path: "^tests/demo/"
        linters: [forbidigo]
      # Allow fmt.Print* in session/mux/picker.go (terminal UI rendering with escape codes)
      - path: "^session/mux/picker\\.go"
        linters: [forbidigo]
