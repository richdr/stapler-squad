name: Auto Tag on Merge

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  tag:
    # Only run when the PR was actually merged, not just closed
    if: github.event.pull_request.merged == true
    name: Bump Version and Tag
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # RELEASE_TOKEN (a PAT) is REQUIRED for the tag push to trigger release.yml.
          # GITHUB_TOKEN pushes are blocked from triggering other workflows (GitHub security restriction).
          # Create a PAT at Settings → Developer settings → Personal access tokens with
          # repo + workflow scopes, then add it as a repository secret named RELEASE_TOKEN.
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Determine bump type from PR labels
        id: bump
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            const semverLabels = ['major', 'minor', 'patch'];
            const found = semverLabels.filter(l => labels.includes(l));
            if (found.length !== 1) {
              core.setFailed(
                `Expected exactly one semver label, found: ${found.join(', ') || 'none'}`
              );
              return;
            }
            core.setOutput('type', found[0]);
            core.info(`Bump type: ${found[0]}`);

      - name: Read current version from latest git tag
        id: current
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo "0.0.0")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Current version: $VERSION"

      - name: Compute next version
        id: next
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          BUMP="${{ steps.bump.outputs.type }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "$BUMP" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac
          NEXT="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Next version: $NEXT"

      - name: Tag and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.next.outputs.version }}"
          git push origin "v${{ steps.next.outputs.version }}"

      # release.yml is triggered automatically by the tag push above.
      # This works when RELEASE_TOKEN (a PAT) is used for checkout — PAT-authenticated
      # pushes trigger other workflows. GITHUB_TOKEN pushes do not (GitHub restriction).
      # If release.yml did not fire, ensure RELEASE_TOKEN is set with repo+workflow scopes.
