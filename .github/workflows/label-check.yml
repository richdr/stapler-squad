name: Label Check

on:
  pull_request:
    types: [opened, labeled, unlabeled, synchronize, reopened]
    branches: [main]

jobs:
  check-label:
    name: Semver Label Required
    runs-on: ubuntu-latest
    steps:
      - name: Check for semver label
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            const semverLabels = ['major', 'minor', 'patch'];
            const found = semverLabels.filter(l => labels.includes(l));

            if (found.length === 0) {
              core.setFailed(
                'PR is missing a semver label. Add one of: major, minor, patch'
              );
            } else if (found.length > 1) {
              core.setFailed(
                `PR has conflicting semver labels: ${found.join(', ')}. Keep only one.`
              );
            } else {
              core.info(`✅ Semver label: ${found[0]}`);
            }
