name: 'Prepare: Protos and Web UI'
description: 'Generates protobuf code and builds the web UI into server/web/dist'

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: web-app/package-lock.json

    - name: Install web dependencies
      shell: bash
      run: cd web-app && npm ci

    - name: Set up buf
      uses: bufbuild/buf-setup-action@v1
      with:
        version: '1.41.0'

    - name: Generate protobuf code
      shell: bash
      run: buf generate

    - name: Build web UI
      shell: bash
      working-directory: web-app
      run: npm run build

    - name: Copy web UI to dist
      shell: bash
      run: cp -r web-app/out server/web/dist
